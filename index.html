<style>
  :root {
    --bg: #FAF9F7;
    --card: #FFFFFF;
    --border: #EDEAE4;
    --text-primary: #1A1816;
    --text-secondary: #6B6560;
    --text-hint: #AAA49C;
    --accent-day: #E8A84A;
    --accent-night: #6B7FC4;
    --accent-aa: #9B7EC8;
    --accent-rest: #82B5A0;
    --accent-makeup: #D4759B;
    --green: #3D8B6E;
    --green-bg: #EAF4EE;
    --warn-bg: #FDF3E7;
    --warn-text: #B8661A;
    --pill-h: 52px;
    --radius: 16px;
    --radius-sm: 10px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    -webkit-text-size-adjust: 100%;
  }

  /* ── TOP BAR ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(250,249,247,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding: 16px 20px 12px;
    border-bottom: 0.5px solid var(--border);
  }
  .topbar-row { display: flex; align-items: center; justify-content: space-between; }
  .app-title { font-size: 22px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.5px; }
  .app-sub { font-size: 12px; color: var(--text-hint); margin-top: 1px; }
  .date-badge {
    font-size: 12px; font-weight: 500;
    background: var(--border); color: var(--text-secondary);
    padding: 5px 12px; border-radius: 20px;
  }

  /* ── WEEK STRIP ── */
  .week-scroll {
    padding: 14px 20px 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .week-scroll::-webkit-scrollbar { display: none; }
  .week-row { display: flex; gap: 8px; width: max-content; }
  .day-btn {
    width: 52px; height: 64px;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    background: var(--card);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px; cursor: pointer;
    transition: all .18s;
    -webkit-user-select: none;
  }
  .day-btn .d-label { font-size: 11px; color: var(--text-hint); font-weight: 500; }
  .day-btn .d-name  { font-size: 15px; font-weight: 700; color: var(--text-secondary); }
  .day-btn.active {
    background: var(--text-primary);
    border-color: var(--text-primary);
  }
  .day-btn.active .d-label { color: rgba(255,255,255,.55); }
  .day-btn.active .d-name  { color: #fff; }
  .day-btn.partial { border-color: var(--accent-day); }
  .day-btn.partial .d-name { color: var(--accent-day); }
  .day-btn.complete { border-color: var(--green); background: var(--green-bg); }
  .day-btn.complete .d-name { color: var(--green); }
  .day-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); opacity: 0; transition: opacity .2s; }
  .day-btn.complete .day-dot { opacity: 1; }

  /* ── MODE TABS ── */
  .mode-wrap { padding: 14px 20px 0; }
  .mode-tabs { display: flex; gap: 6px; background: var(--border); border-radius: 12px; padding: 3px; }
  .mode-tab {
    flex: 1; padding: 9px 6px;
    border-radius: 10px; border: none;
    background: transparent;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px; font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer; transition: all .15s;
    -webkit-user-select: none;
  }
  .mode-tab.active { background: var(--card); color: var(--text-primary); }

  /* ── DAY NOTE ── */
  .day-note {
    margin: 12px 20px 0;
    padding: 10px 14px;
    background: var(--warn-bg);
    border-radius: var(--radius-sm);
    font-size: 12px; color: var(--warn-text); font-weight: 500;
    display: none;
  }
  .day-note.visible { display: block; }

  /* ── PROGRESS ── */
  .prog-wrap { padding: 14px 20px 4px; }
  .prog-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .prog-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .prog-count { font-size: 13px; color: var(--text-hint); }
  .prog-bar { height: 5px; border-radius: 3px; background: var(--border); overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 3px; background: var(--green); transition: width .35s cubic-bezier(.34,1.56,.64,1); }

  /* ── STEP CARDS ── */
  .steps-wrap { padding: 10px 20px; }
  .step-card {
    display: flex; align-items: center; gap: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 14px 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all .15s;
    -webkit-user-select: none;
    position: relative; overflow: hidden;
  }
  .step-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
    background: var(--accent-line, transparent);
    transition: background .2s;
  }
  .step-card.is-next { border-color: #B5D4F4; }
  .step-card.is-next::before { background: #378ADD; }
  .step-card.is-done { opacity: .5; }
  .step-card.is-done::before { background: var(--green); }
  .step-card:active { transform: scale(0.985); background: #F7F5F2; }

  .prod-icon {
    width: 58px; height: 58px; border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; flex-shrink: 0;
  }
  .step-info { flex: 1; min-width: 0; }
  .step-num-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .step-num {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--border); color: var(--text-hint);
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .step-card.is-next .step-num { background: #E6F1FB; color: #185FA5; }
  .step-tag {
    font-size: 10px; font-weight: 600; padding: 2px 7px;
    border-radius: 6px; letter-spacing: .02em;
  }
  .t-new    { background: #E1F5EE; color: #0F6E56; }
  .t-old    { background: #EEEDFE; color: #534AB7; }
  .t-sample { background: #FAEEDA; color: #854F0B; }
  .t-warn   { background: #FCEBEB; color: #A32D2D; }
  .t-opt    { background: #F1EFE8; color: #5F5E5A; }
  .step-name { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 2px; line-height: 1.3; }
  .step-brand { font-size: 11px; color: var(--text-hint); margin-bottom: 4px; }
  .step-tip { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }

  .check-btn {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1.5px solid var(--border);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; cursor: pointer; transition: all .18s;
  }
  .check-btn svg { width: 14px; height: 14px; opacity: 0; transition: opacity .15s; }
  .step-card.is-done .check-btn { background: var(--green-bg); border-color: var(--green); }
  .step-card.is-done .check-btn svg { opacity: 1; }

  /* ── DONE BANNER ── */
  .done-banner {
    background: var(--green-bg);
    border: 1px solid #97C459;
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    margin: 8px 0 16px;
    display: none;
  }
  .done-banner.visible { display: block; }
  .done-banner .done-icon { font-size: 36px; margin-bottom: 6px; }
  .done-banner .done-title { font-size: 16px; font-weight: 700; color: #27500A; margin-bottom: 3px; }
  .done-banner .done-sub { font-size: 13px; color: #3B6D11; }

  /* ── NOTES ── */
  .notes-section { padding: 0 20px 16px; }
  .notes-title { font-size: 11px; font-weight: 700; color: var(--text-hint); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; }
  .note-item {
    font-size: 12px; color: var(--text-secondary);
    background: var(--card); border: 0.5px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 13px;
    margin-bottom: 6px; line-height: 1.55;
  }
  .note-item strong { color: var(--warn-text); }

  /* ── BOTTOM SAFE ── */
  .bottom-pad { height: calc(20px + var(--safe-bottom)); }

  /* ── RESET ── */
  .reset-wrap { padding: 0 20px 4px; }
  .reset-btn {
    width: 100%; padding: 12px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: transparent; color: var(--text-hint);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px; cursor: pointer;
    transition: all .15s;
  }
  .reset-btn:active { background: var(--border); }

  /* ── LEGEND ── */
  .legend-wrap { padding: 4px 20px 12px; display: flex; flex-wrap: wrap; gap: 6px; }
  .leg { font-size: 10px; display: flex; align-items: center; gap: 4px; color: var(--text-hint); }
</style>
</head>

    night_note: '今晚是休息夜，讓肌膚休息。只用歐舒丹 → 益生精華 → 胖粉',
    makeup_routine: [
      {id:'dafen'}, {id:'dprogram'}, {id:'fenfei'}, {id:'meiji'}, {id:'snow'}
    ]
  }
];

const DAY_NAMES = ['一','二','三','四','五','六','日'];
const MODE_LABELS = { day: '日間保養', night: '夜間保養', makeup: '化妝日保養' };

let curDay = 0;
let curMode = 'day';
let progress = {}; // key: "d_m" => Set of done indices

function pKey(d, m) { return d + '_' + m; }
function getDone(d, m) {
  const k = pKey(d, m);
  if (!progress[k]) progress[k] = new Set();
  return progress[k];
}
function getRoutine(d, m) {
  const w = WEEK[d];
  if (m === 'day') return w.day_routine;
  if (m === 'night') return w.night_routine;
  return w.makeup_routine;
}

// ── Date badge ──
function updateDateBadge() {
  const now = new Date();
  const m = now.getMonth() + 1;
  const d = now.getDate();
  document.getElementById('dateBadge').textContent = m + '月' + d + '日';
  // Auto-select today's weekday
  const jsDay = now.getDay(); // 0=Sun
  const idx = jsDay === 0 ? 6 : jsDay - 1;
  curDay = idx;
}

// ── Render week ──
function renderWeek() {
  const row = document.getElementById('weekRow');
  row.innerHTML = '';
  WEEK.forEach((w, i) => {
    const done_d = getDone(i, 'day');
    const done_n = getDone(i, 'night');
    const total_d = w.day_routine.length;
    const total_n = w.night_routine.length;
    const allDone = done_d.size >= total_d && done_n.size >= total_n;
    const anyDone = done_d.size > 0 || done_n.size > 0;

    const btn = document.createElement('button');
    btn.className = 'day-btn' +
      (i === curDay ? ' active' : '') +
      (allDone ? ' complete' : anyDone ? ' partial' : '');
    btn.innerHTML = `<span class="d-label">${DAY_NAMES[i]}</span>
                     <span class="d-name">${i+1}</span>
                     <span class="day-dot"></span>`;
    btn.onclick = () => { curDay = i; renderAll(); };
    row.appendChild(btn);
  });
}

// ── Render steps ──
function renderSteps() {
  const routine = getRoutine(curDay, curMode);
  const done = getDone(curDay, curMode);
  const total = routine.length;
  const doneCount = done.size;
  const w = WEEK[curDay];

  // Progress
  const pct = total > 0 ? Math.round(doneCount / total * 100) : 0;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progCount').textContent = doneCount + ' / ' + total;
  document.getElementById('progTitle').textContent = MODE_LABELS[curMode];

  // Night note
  const noteEl = document.getElementById('dayNote');
  if (curMode === 'night' && w.night_note) {
    noteEl.textContent = '📌 ' + w.night_note;
    noteEl.classList.add('visible');
  } else {
    noteEl.classList.remove('visible');
  }

  // Mode tab: show night label
  document.querySelectorAll('.mode-tab').forEach(t => {
    if (t.dataset.mode === 'night') {
      t.textContent = '🌙 ' + (w.night_label || '夜間');
    }
  });

  // Steps
  const list = document.getElementById('stepsList');
  list.innerHTML = '';
  routine.forEach((step, i) => {
    const prod = P[step.id];
    const isDone = done.has(i);
    const isNext = !isDone && i === [...Array(i)].reduce((acc, _, j) => done.has(j) ? acc + 1 : acc, 0) + (done.size);
    // simpler next: first not-done
    const firstNotDone = routine.findIndex((_, j) => !done.has(j));
    const isNextStep = i === firstNotDone;

    const card = document.createElement('div');
    card.className = 'step-card' + (isDone ? ' is-done' : '') + (isNextStep && !isDone ? ' is-next' : '');
    card.onclick = () => toggleStep(i);

    card.innerHTML = `
      <div class="prod-icon" style="background:${prod.bg}">${prod.emoji}</div>
      <div class="step-info">
        <div class="step-num-row">
          <span class="step-num">${i+1}</span>
          <span class="step-tag ${prod.tag}">${prod.tagLabel}</span>
        </div>
        <div class="step-name">${prod.name}</div>
        <div class="step-brand">${prod.brand} <span style="color:var(--text-hint);font-weight:700">· ${prod.shortName}</span></div>
        <div class="step-tip">${prod.tip}</div>
      </div>
      <div class="check-btn">
        <svg viewBox="0 0 14 14" fill="none">
          <path d="M2.5 7L5.5 10L11.5 4" stroke="#27500A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>`;
    list.appendChild(card);
  });

  // Done banner
  const banner = document.getElementById('doneBanner');
  const titleEl = document.getElementById('doneTitleText');
  const subEl = document.getElementById('doneSubText');
  if (doneCount === total && total > 0) {
    titleEl.textContent = '完成！';
    subEl.textContent = w.day + ' ' + MODE_LABELS[curMode] + ' 全部完成 ✓';
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }
}

function toggleStep(i) {
  const done = getDone(curDay, curMode);
  if (done.has(i)) done.delete(i);
  else done.add(i);
  renderAll();
}

function setMode(m, el) {
  curMode = m;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderAll();
}

function resetCurrent() {
  progress[pKey(curDay, curMode)] = new Set();
  renderAll();
}

function renderAll() {
  renderWeek();
  renderSteps();
}

updateDateBadge();
renderAll();
</script>
</body>
</html>
